name: Deploy API

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # Build + push da imagem no runner do GitHub (rápido, recursos gratuitos)
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR exige o nome da imagem em minúsculas (o usuário pode ter maiúsculas)
      - name: Definir nome da imagem em minúsculas
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # Deploy roda DENTRO da VPS (runner self-hosted) — sem SSH, sem abrir a porta 22
  deploy:
    needs: build
    runs-on: [self-hosted, vps]
    steps:
      - name: Atualizar container da API na VPS
        run: |
          cd /opt/psicomanager
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u mcszao --password-stdin
          docker compose pull api
          docker compose up -d api
          docker image prune -f
