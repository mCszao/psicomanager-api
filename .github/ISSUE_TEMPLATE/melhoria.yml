name: ✨ Melhoria / Feature
description: Sugerir uma melhoria ou nova funcionalidade
title: "[Melhoria]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problema
    attributes:
      label: Problema / motivação
      description: Que dor ou necessidade isso resolve?
    validations:
      required: true
  - type: textarea
    id: proposta
    attributes:
      label: Proposta
  - type: textarea
    id: criterios
    attributes:
      label: Critérios de aceite
      placeholder: |
        - [ ] ...
        - [ ] ...
